name: checks

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fedora-checks:
    runs-on: ubuntu-latest
    container:
      # Keep this pinned to a stable Fedora release so CI remains reproducible.
      image: fedora:41
    steps:
      - uses: actions/checkout@v5

      - name: Install check dependencies
        run: |
          dnf install -y \
            bash \
            cargo \
            gcc \
            coreutils \
            diffutils \
            findutils \
            grep \
            rust \
            rustfmt \
            sed \
            util-linux \
            which \
            shellcheck

      - name: Rust format check
        run: cargo fmt --all --check

      - name: Rust unit/integration tests
        run: cargo test --all-targets --locked

      - name: Rust compile check
        run: cargo check --all-targets --locked

      - name: Bash syntax checks
        run: bash -n uki-setup.sh tests/test_uki_setup.sh

      - name: ShellCheck
        run: shellcheck -P . uki-setup.sh tests/test_uki_setup.sh

      - name: Project checks
        run: bash tests/test_uki_setup.sh
